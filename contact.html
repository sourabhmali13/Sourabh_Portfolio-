    <main>
        <h2 class="section-title" data-aos="fade-down">Get In Touch</h2>
        
        <div class="contact-container">
            <div class="glass-panel" data-aos="fade-right">
                <h3 style="margin-bottom: 30px;">Contact Information</h3>
                <div class="contact-info">
                    <p><i class="fas fa-envelope"></i> <a href="mailto:sourabhmali675@gmail.com" style="color: inherit; text-decoration: none;">sourabhmali675@gmail.com</a></p>
                    <p><i class="fas fa-phone-alt"></i> +91 7499596693</p>
                    <p><i class="fas fa-map-marker-alt"></i> Jath, Maharashtra, India</p>
                    <p><i class="fab fa-linkedin"></i> <a href="https://www.linkedin.com/in/sourabh-mali-b2b716398/" target="_blank" style="color: inherit; text-decoration: none;">LinkedIn Profile</a></p>
                    <p><i class="fab fa-github"></i> <a href="https://github.com/sourabhmali13" target="_blank" style="color: inherit; text-decoration: none;">GitHub Profile</a></p>
                </div>
            </div>

            <div class="glass-panel" data-aos="fade-left">
                <form id="contact-form" action="https://formspree.io/f/xnqewqea" method="POST" class="contact-form">
                    <div class="form-group">
                        <input type="text" name="name" placeholder="Your Name" required>
                    </div>
                    <div class="form-group">
                        <input type="email" name="email" placeholder="Your Email" required>
                    </div>
                    <div class="form-group">
                        <input type="text" name="subject" placeholder="Subject" required>
                    </div>
                    <div class="form-group">
                        <textarea name="message" placeholder="Your Message" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Send Message</button>
                </form>
            </div>
        </div>

        <div class="map-container" data-aos="fade-up" data-aos-offset="0">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d121703.18731338662!2d75.14761499268393!3d17.060167691656096!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc6b9d62d22b281%3A0x6b49e89b4f620bd3!2sJath%2C%20Maharashtra!5e0!3m2!1sen!2sin!4v1715941914217!5m2!1sen!2sin"
